{% extends "base.html" %}
{% block title %}Modifica Categoria — PyArtist{% endblock %}
{% block content %}
<div class="max-w-lg">
  <h1 class="font-display text-2xl font-semibold mb-6">Modifica Categoria</h1>
  <form method="post" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium mb-1">Nome <span class="text-red-500">*</span></label>
      <input type="text" name="name" value="{{ category.name }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Slug</label>
      <input type="text" name="slug" value="{{ category.slug }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>
    <div class="flex gap-3">
      <button type="submit" class="bg-accent text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-[#6a8ea0] transition-colors">Salva</button>
      <a href="{{ url_for('gallery.categories') }}" class="border border-gray-300 text-gray-600 px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
