{% extends "base.html" %}
{% block title %}Carica Media — PyArtist{% endblock %}
{% block head %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const sel = document.getElementById('category');
    const _allOpts = [...sel.options]; // snapshot iniziale di tutte le option

    function filterCategories(tipo) {
      const currentVal = sel.value;
      sel.innerHTML = '';
      _allOpts.forEach(opt => {
        if (!opt.value || opt.dataset.tipo === tipo) sel.appendChild(opt);
      });
      sel.value = [...sel.options].some(o => o.value === currentVal) ? currentVal : '';
    }

    document.querySelectorAll('input[name="tipo"]').forEach(r => {
      r.addEventListener('change', () => filterCategories(r.value));
    });
    filterCategories('artwork');
  });
</script>
{% endblock %}
{% block content %}
<div class="max-w-xl">
  <h1 class="font-display text-2xl font-semibold mb-6">Carica Media</h1>

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium mb-2">Tipo <span class="text-red-500">*</span></label>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="tipo" value="artwork" checked class="accent-[#7A9EB1]">
          <span class="text-sm">Artwork</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="radio" name="tipo" value="foto" class="accent-[#7A9EB1]">
          <span class="text-sm">Foto</span>
        </label>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="title">Titolo <span class="text-red-500">*</span></label>
      <input type="text" id="title" name="title" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="category">Categoria</label>
      <select id="category" name="category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for cat in categories %}
        <option value="{{ cat.slug }}" data-tipo="{{ cat.tipo or 'artwork' }}">{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="formato">Formato</label>
      <select id="formato" name="formato" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuno —</option>
        {% for f in formati %}
        <option value="{{ f.label }}">{{ f.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="tecnica">Tecnica</label>
      <select id="tecnica" name="tecnica" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for t in tecniche %}
        <option value="{{ t.label }}">{{ t.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="collezione">Collezione</label>
      <select id="collezione" name="collezione" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for c in collezioni %}
        <option value="{{ c.label }}">{{ c.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="year">Anno</label>
      <input type="text" id="year" name="year" maxlength="4" placeholder="es. 2024" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="technique">Tecnica libera</label>
      <input type="text" id="technique" name="technique" value="Acquerello su carta" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
      <p class="text-xs text-gray-400 mt-1">Campo libero, alternativo alla select Tecnica.</p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="descrizione">Descrizione</label>
      <textarea id="descrizione" name="descrizione" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="image">Immagine <span class="text-red-500">*</span></label>
      <input type="file" id="image" name="image" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-accent file:text-white hover:file:bg-[#6a8ea0]">
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-accent text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-[#6a8ea0] transition-colors">Carica Media</button>
      <a href="{{ url_for('artworks.list_artworks') }}" class="border border-gray-300 text-gray-600 px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
