{% extends "base.html" %}
{% block title %}Modifica Opera — PyArtist{% endblock %}
{% block content %}
<div class="max-w-xl">
  <h1 class="font-display text-2xl font-semibold mb-6">Modifica Opera</h1>

  {% if artwork.thumb_path %}
  <div class="mb-5">
    <img src="{{ artwork.thumb_path }}" alt="{{ artwork.title }}" class="w-32 h-32 object-cover rounded-lg border border-gray-200">
  </div>
  {% endif %}

  <form method="post" enctype="multipart/form-data" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">
    <div>
      <label class="block text-sm font-medium mb-1" for="title">Titolo <span class="text-red-500">*</span></label>
      <input type="text" id="title" name="title" value="{{ artwork.title }}" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="category">Categoria</label>
      <select id="category" name="category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for cat in categories %}
        <option value="{{ cat.slug }}" {% if artwork.category == cat.slug %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="formato">Formato</label>
      <select id="formato" name="formato" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuno —</option>
        {% for f in formati %}
        <option value="{{ f.label }}" {% if artwork.formato == f.label %}selected{% endif %}>{{ f.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="tecnica">Tecnica</label>
      <select id="tecnica" name="tecnica" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for t in tecniche %}
        <option value="{{ t.label }}" {% if artwork.tecnica == t.label %}selected{% endif %}>{{ t.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="collezione">Collezione</label>
      <select id="collezione" name="collezione" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        <option value="">— nessuna —</option>
        {% for c in collezioni %}
        <option value="{{ c.label }}" {% if artwork.collezione == c.label %}selected{% endif %}>{{ c.label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="year">Anno</label>
      <input type="text" id="year" name="year" value="{{ artwork.year or '' }}" maxlength="4" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="technique">Tecnica libera</label>
      <input type="text" id="technique" name="technique" value="{{ artwork.technique or '' }}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
      <p class="text-xs text-gray-400 mt-1">Campo libero, alternativo alla select Tecnica.</p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="descrizione">Descrizione</label>
      <textarea id="descrizione" name="descrizione" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">{{ artwork.descrizione or '' }}</textarea>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" id="is_published" name="is_published" {% if artwork.is_published %}checked{% endif %} class="w-4 h-4 accent-[#7A9EB1]">
      <label for="is_published" class="text-sm font-medium">Pubblicata</label>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1" for="image">Nuova immagine (opzionale)</label>
      <input type="file" id="image" name="image" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-accent file:text-white hover:file:bg-[#6a8ea0]">
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-accent text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-[#6a8ea0] transition-colors">Salva modifiche</button>
      <a href="{{ url_for('artworks.list_artworks') }}" class="border border-gray-300 text-gray-600 px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Annulla</a>
    </div>
  </form>
</div>
{% endblock %}
