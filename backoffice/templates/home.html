{% extends "base.html" %}
{% block title %}Dashboard — PyArtist{% endblock %}
{% block content %}
<h1 class="font-display text-2xl font-semibold mb-6">Dashboard</h1>

<div class="grid grid-cols-2 sm:grid-cols-4 gap-6">
  <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm text-center">
    <p class="text-3xl font-bold text-accent">{{ artwork_count }}</p>
    <p class="mt-1 text-sm text-gray-500">Media totali</p>
  </div>
  <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm text-center">
    <p class="text-3xl font-bold text-accent">{{ published_count }}</p>
    <p class="mt-1 text-sm text-gray-500">Media pubblicati</p>
  </div>
  <a href="{{ url_for('gallery.gallery_list') }}" class="block bg-white rounded-xl border border-gray-200 p-6 shadow-sm text-center transition-colors hover:border-accent hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2">
    <p class="text-3xl font-bold text-accent">{{ gallery_count }}</p>
    <p class="mt-1 text-sm text-gray-500">Gallerie</p>
  </a>
  <a href="{{ url_for('config.index') }}#categorie" class="block bg-white rounded-xl border border-gray-200 p-6 shadow-sm text-center transition-colors hover:border-accent hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2">
    <p class="text-3xl font-bold text-accent">{{ category_count }}</p>
    <p class="mt-1 text-sm text-gray-500">Categorie</p>
  </a>
</div>

<div class="mt-10 flex gap-4 flex-wrap">
  <a href="/artworks/upload" class="inline-block bg-accent text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-[#6a8ea0] transition-colors">+ Nuovo Media</a>
  <a href="/gallery/new" class="inline-block border border-accent text-accent px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-accent hover:text-white transition-colors">+ Nuova Galleria</a>
</div>
{% endblock %}
